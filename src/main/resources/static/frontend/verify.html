<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProofIt — Verify Document</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background:
                radial-gradient(circle at 18% 15%, rgba(99, 102, 241, 0.32), transparent 32%),
                radial-gradient(circle at 84% 12%, rgba(34, 197, 94, 0.14), transparent 28%),
                linear-gradient(135deg, #06070f 0%, #111827 48%, #070711 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .logo {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 40px;
        }
        .card {
            background: rgba(255, 255, 255, 0.09);
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 20px;
            padding: 48px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            box-shadow: 0 28px 80px rgba(0, 0, 0, 0.34);
            backdrop-filter: blur(22px);
        }
        .loading { color: #cbd5e1; font-size: 16px; }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.16);
            border-top-color: #a5b4fc;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .verified-icon { font-size: 72px; margin-bottom: 20px; }
        .verified-title {
            font-size: 28px;
            font-weight: 700;
            color: #22c55e;
            margin-bottom: 8px;
        }
        .verified-sub {
            color: #cbd5e1;
            margin-bottom: 36px;
            font-size: 15px;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 16px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            text-align: left;
            gap: 20px;
        }
        .detail-label {
            color: #94a3b8;
            font-size: 13px;
            flex-shrink: 0;
            width: 120px;
        }
        .detail-value {
            color: #e5e7eb;
            font-size: 13px;
            font-family: monospace;
            word-break: break-all;
        }
        .chain-info {
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(165, 180, 252, 0.22);
            border-radius: 12px;
            padding: 20px;
            margin-top: 28px;
            text-align: left;
            backdrop-filter: blur(14px);
        }
        .chain-info h4 {
            color: #c4b5fd;
            font-size: 13px;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .chain-info p {
            color: #cbd5e1;
            font-size: 13px;
            line-height: 1.6;
        }
        .file-check {
            margin-top: 28px;
            padding-top: 28px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        .file-check-title {
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .file-check-sub {
            color: #cbd5e1;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 18px;
        }
        .file-input {
            width: 100%;
            background: rgba(2, 6, 23, 0.38);
            border: 1px dashed rgba(255, 255, 255, 0.22);
            border-radius: 10px;
            color: #e5e7eb;
            cursor: pointer;
            font-size: 14px;
            padding: 14px;
        }
        .file-result {
            border-radius: 10px;
            display: none;
            font-size: 14px;
            line-height: 1.5;
            margin-top: 16px;
            padding: 14px 16px;
        }
        .file-result.match {
            background: rgba(27, 45, 27, 0.72);
            border: 1px solid rgba(74, 222, 128, 0.5);
            color: #86efac;
        }
        .file-result.mismatch {
            background: rgba(45, 27, 27, 0.72);
            border: 1px solid rgba(248, 113, 113, 0.5);
            color: #fca5a5;
        }
        .back-btn {
            margin-top: 32px;
            display: inline-block;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            padding: 12px 28px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            box-shadow: 0 18px 45px rgba(99, 102, 241, 0.34);
        }
        .error-icon { font-size: 72px; margin-bottom: 20px; }
        .error-title {
            font-size: 28px;
            font-weight: 700;
            color: #ef4444;
            margin-bottom: 8px;
        }
        .verify-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .verify-form {
            display: flex;
            gap: 12px;
            margin-top: 28px;
        }
        .verify-input {
            flex: 1;
            min-width: 0;
            background: rgba(2, 6, 23, 0.38);
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            padding: 14px 16px;
            outline: none;
            backdrop-filter: blur(12px);
        }
        .verify-input:focus {
            border-color: #a5b4fc;
        }
        .verify-btn {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            border-radius: 10px;
            color: #fff;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            padding: 14px 22px;
            box-shadow: 0 18px 45px rgba(99, 102, 241, 0.34);
        }
        @media (max-width: 560px) {
            .card { padding: 32px 22px; }
            .verify-form { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="logo">🔐 ProofIt</div>

    <div class="card" id="card">
        <div class="spinner"></div>
        <div class="loading">Verifying document on the chain...</div>
    </div>

    <script>
        const API = '/api';
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');

        async function verify() {
            if (!token) {
                showVerifyForm();
                return;
            }
            try {
                const res = await fetch(`${API}/documents/public/verify/${token}`);
                if (!res.ok) {
                    showError('Document not found');
                    return;
                }
                const doc = await res.json();
                showVerified(doc);
            } catch (e) {
                showError('Could not connect to verification server');
            }
        }

        function showVerified(doc) {
            document.getElementById('card').innerHTML = `
                <div class="verified-icon">✅</div>
                <div class="verified-title">Document Verified</div>
                <div class="verified-sub">This document is authentic and has not been tampered with</div>

                <div class="detail-row">
                    <span class="detail-label">File Name</span>
                    <span class="detail-value">${doc.fileName}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Created On</span>
                    <span class="detail-value">${new Date(doc.uploadedAt).toLocaleString('en-IN')}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">SHA-256 Hash</span>
                    <span class="detail-value">${doc.documentHash}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Chain Hash</span>
                    <span class="detail-value">${doc.chainHash}</span>
                </div>

                <div class="chain-info">
                    <h4>⛓️ Hash Chain Verification</h4>
                    <p>This document's SHA-256 fingerprint is permanently recorded in a tamper-proof hash chain. Any modification to the original file would produce a completely different hash, instantly exposing tampering.</p>
                </div>

                <div class="file-check">
                    <div class="file-check-title">Check a File Against This Proof</div>
                    <div class="file-check-sub">Upload the original file or a changed copy to see whether it matches this certificate.</div>
                    <input class="file-input" type="file" onchange="verifyFile(this.files[0])">
                    <div class="file-result" id="file-result"></div>
                </div>

                <a href="index.html" class="back-btn">🔐 ProofIt Your Own Documents</a>
            `;
        }

        function showError(msg) {
            document.getElementById('card').innerHTML = `
                <div class="error-icon">❌</div>
                <div class="error-title">Verification Failed</div>
                <div class="verified-sub">${msg}</div>
                <a href="index.html" class="back-btn">Go to ProofIt</a>
            `;
        }

        function showVerifyForm() {
            document.getElementById('card').innerHTML = `
                <div class="verified-icon">🔎</div>
                <div class="verify-title">Verify a Document</div>
                <div class="verified-sub">Paste a verification token or open a shared ProofIt verification link.</div>
                <form class="verify-form" onsubmit="submitToken(event)">
                    <input class="verify-input" id="verify-token" type="text" placeholder="Verification token" autocomplete="off">
                    <button class="verify-btn" type="submit">Verify</button>
                </form>
                <a href="index.html" class="back-btn">Go to ProofIt</a>
            `;
        }

        function submitToken(event) {
            event.preventDefault();
            const input = document.getElementById('verify-token');
            const nextToken = input.value.trim();
            if (!nextToken) {
                input.focus();
                return;
            }
            window.location.href = `verify.html?token=${encodeURIComponent(nextToken)}`;
        }

        async function verifyFile(file) {
            if (!file) return;
            const result = document.getElementById('file-result');
            result.className = 'file-result';
            result.style.display = 'block';
            result.textContent = 'Checking file hash...';

            const formData = new FormData();
            formData.append('file', file);

            try {
                const res = await fetch(`${API}/documents/verify/${token}/file`, {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                result.classList.add(data.verified ? 'match' : 'mismatch');
                result.textContent = data.message;
            } catch (e) {
                result.classList.add('mismatch');
                result.textContent = 'Could not verify this file. Is the server running?';
            }
        }

        verify();
    </script>
</body>
</html>
